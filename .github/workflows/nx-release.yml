name: Release admingate-guacd

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Next version (e.g. 1.6.1-procube.1 or 1.6.2-procube.0)'
        required: true
        type: string
      dryRun:
        description: 'Dry run (no changes will be pushed)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: docker-repository.procube.jp
  IMAGE_NAME: admingate-guacd

jobs:
  release:
    name: Release Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate requested version
        run: |
          if ! printf '%s' '${{ inputs.version }}' | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-procube\.[0-9]+$'; then
            echo '❌ version must match <upstream-version>-procube.<number>'
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Nx Release (Version)
        run: |
          if [ "${{ inputs.dryRun }}" = "true" ]; then
            pnpm exec nx release version "${{ inputs.version }}" --projects=admingate-guacd --dry-run
          else
            pnpm exec nx release version "${{ inputs.version }}" --projects=admingate-guacd --git-commit=false --git-tag=false
          fi

      - name: Sync embedded version strings
        if: inputs.dryRun == false
        run: node tools/scripts/sync-release-manifests.mjs

      - name: Setup Docker certificates
        if: inputs.dryRun == false
        run: |
          mkdir -p ~/.docker/certs.d/${{ env.REGISTRY }}
          echo "${{ secrets.NSSDC_KEY }}" > ~/.docker/certs.d/${{ env.REGISTRY }}/client.key
          echo "${{ secrets.NSSDC_CRT }}" > ~/.docker/certs.d/${{ env.REGISTRY }}/client.cert

          sudo mkdir -p /etc/docker/certs.d/${{ env.REGISTRY }}
          sudo cp ~/.docker/certs.d/${{ env.REGISTRY }}/client.key /etc/docker/certs.d/${{ env.REGISTRY }}/client.key
          sudo cp ~/.docker/certs.d/${{ env.REGISTRY }}/client.cert /etc/docker/certs.d/${{ env.REGISTRY }}/client.cert

      - name: Set up Docker Buildx
        if: inputs.dryRun == false
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY }}"]
              [[registry."${{ env.REGISTRY }}".keypair]]
                key="/etc/docker/certs.d/${{ env.REGISTRY }}/client.key"
                cert="/etc/docker/certs.d/${{ env.REGISTRY }}/client.cert"

      - name: Generate Docker metadata
        if: inputs.dryRun == false
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}

      - name: Build and push Docker image
        if: inputs.dryRun == false
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          provenance: false

      - name: Commit and tag release
        if: inputs.dryRun == false
        run: |
          git add package.json pnpm-lock.yaml configure.ac bin/guacctl

          if ! git diff --cached --quiet; then
            git commit -m "chore(release): admingate-guacd@${{ inputs.version }}"
          fi

          git tag -a "admingate-guacd@${{ inputs.version }}" -m "Release admingate-guacd@${{ inputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}" --tags --verbose

      - name: Summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Requested version: \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run: ${{ inputs.dryRun }}" >> "$GITHUB_STEP_SUMMARY"
